# FB ループ 2 層目 (CI)。AI ターン内 hook と同等の検査を GitHub 上で再実行し、
# 手動 push が hook を素通りする抜け道を塞ぐ。構成: .claude/rules/feedback-loop.md
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # gitleaks-action は push イベントから差分レンジを計算するが、initial push で
  # 親の無いコミットを参照して落ちる。レンジ計算に依存せず全履歴を毎回スキャンする
  # (repo が小さいうちは全走査のほうが単純で検査も強い)。
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1 # devbox.lock の gitleaks と合わせる
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (全履歴 + 作業ツリー)
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git --no-banner --redact .
          ./gitleaks dir --no-banner --redact .

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docs placement
        run: bash scripts/check_docs.sh
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: build
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew build
          else
            echo "gradlew 不在のため build をスキップ (アプリ scaffold 前)"
          fi
