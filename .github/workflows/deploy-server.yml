# :server を Cloud Run へデプロイする (docs/stock/sync.md の同期 API)。
# Firebase/GCP のセットアップが済むまでは repo variable ENABLE_SERVER_DEPLOY で
# 無効化されている (手順: docs/stock/setup-firebase.md)。
# 必要な設定:
#   variables: ENABLE_SERVER_DEPLOY=true, GCP_PROJECT_ID, GCP_REGION (例 asia-northeast1)
#   secrets:   GCP_SA_KEY (Cloud Run デプロイ権限を持つサービスアカウントの JSON キー)
name: deploy-server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "core/**"
      - "gradle/**"
      - "*.gradle.kts"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.ENABLE_SERVER_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: server をビルド (テスト込み)
        run: ./gradlew :server:test :server:installDist

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: コンテナを build & push
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/adaptive-pulse/server:${GITHUB_SHA::12}"
          gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
          docker build -f server/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: adaptive-pulse-server
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}

  skipped:
    runs-on: ubuntu-latest
    if: vars.ENABLE_SERVER_DEPLOY != 'true'
    steps:
      - name: 未設定のためスキップ
        run: echo "ENABLE_SERVER_DEPLOY が未設定のためデプロイをスキップ (docs/stock/setup-firebase.md)"
