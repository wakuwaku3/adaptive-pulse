# server コンテナをビルドして Artifact Registry に push し、Cloud Run を更新する。
# Cloud Run サービス・Artifact Registry リポジトリ・実行 SA・IAM は
# Terraform (infra/) が管理する。本 workflow は image だけを差し替える。
name: deploy-server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "core/**"
      - "gradle/**"
      - "*.gradle.kts"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.GCP_PROJECT_ID != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: server をビルド (テスト込み)
        run: ./gradlew :server:test :server:installDist

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: コンテナを build & push
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/adaptive-pulse/server:${GITHUB_SHA::12}"
          gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
          docker build -f server/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: adaptive-pulse-server
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}

  skipped:
    runs-on: ubuntu-latest
    if: vars.GCP_PROJECT_ID == ''
    steps:
      - name: bootstrap 未実施のためスキップ
        run: echo "infra/bootstrap.sh が未実行 (GCP_PROJECT_ID 未設定)。docs/stock/setup-firebase.md を参照。"
