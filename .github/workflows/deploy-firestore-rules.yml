# Firestore Security Rules を Firebase に deploy する。
# Rules はサーバ層の代わりにアクセス制御と LWW を強制する唯一の防衛線なので
# (docs/stock/sync.md)、(1) 先に rules-test/ の emulator テストで挙動を検証し、
# (2) 通った場合だけ実 Firebase に deploy する。
name: deploy-firestore-rules

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firebase.json"
      - "rules-test/**"
      - ".github/workflows/deploy-firestore-rules.yml"
  pull_request:
    paths:
      - "firestore.rules"
      - "firebase.json"
      - "rules-test/**"
      - ".github/workflows/deploy-firestore-rules.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-firestore-rules
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rules-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rules-test/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && vars.FIREBASE_PROJECT_ID != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g firebase-tools@13
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_RULES_DEPLOYER_KEY }}
      - name: Rules を deploy
        run: firebase deploy --only firestore:rules --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive

  skipped:
    if: github.event_name != 'pull_request' && vars.FIREBASE_PROJECT_ID == ''
    runs-on: ubuntu-latest
    steps:
      - name: bootstrap 未実施のためスキップ
        run: echo "scripts/setup-firebase-rules-deploy.sh が未実行 (FIREBASE_PROJECT_ID 未設定)。docs/stock/setup-firebase.md を参照。"
